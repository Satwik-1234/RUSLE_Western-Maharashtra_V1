[general]
# Streamlit Cloud uses this to know which file to run
# Relative to the repo root

[server]
headless = true
port = 8501
enableCORS = false

[theme]
primaryColor = "#06b6d4"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1f2e"
textColor = "#e2e8f0"
font = "sans serif"

[browser]
gatherUsageStats = false
